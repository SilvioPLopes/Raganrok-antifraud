version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ragnarok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgre}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - ragnarok-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ragnarok-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ragnarok-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  antifraude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragnarok-antifraude
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_PASS: ${DB_PASS:-postgre}
      ANTIFRAUDE_API_KEY: ${ANTIFRAUDE_API_KEY:-}
      REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ragnarok_antifraude_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8081:8081"
    networks:
      - ragnarok-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/fraud/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ragnarok-net
    depends_on:
      antifraude:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - ragnarok-net
    depends_on:
      - prometheus

networks:
  ragnarok-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana-data:
